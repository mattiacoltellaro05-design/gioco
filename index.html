<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Revenue Simulator PRO - Fix</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --sunset-orange: #ff6b35;
      --sunset-dark: #e55a30;
      --sunset-light: #ff8e60;
      --bg-gold: #fdf2e9;
      --card-bg: #fff8f0;
      --text-dark: #2c1b12;
      --shadow: 0 8px 32px rgba(255,107,53,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, var(--bg-gold), #ffe8d6);
      min-height: 100vh; 
      color: var(--text-dark);
      overflow-x: hidden;
      position: relative;
    }
    
    .customers { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      pointer-events: none; 
      z-index: 10; 
    }
    .customer { 
      position: absolute; 
      font-size: 2.5em; 
      animation: enterBar 2.5s forwards; 
      z-index: 20;
    }
    @keyframes enterBar { 
      0% { transform: translateX(-150px) translateY(100px) scale(0.5); opacity: 0; } 
      30% { opacity: 1; scale(1); } 
      80% { opacity: 1; }
      100% { transform: translateX(50%) translateY(-50px) scale(1.2); opacity: 0; } 
    }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 5; }
    h1 { 
      text-align: center; font-size: 2.5em; 
      background: linear-gradient(45deg, var(--sunset-orange), var(--sunset-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 30px; 
    }
    
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
    
    .card { 
      background: var(--card-bg); border-radius: 20px; padding: 25px; 
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    
    .cocktail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
    .cocktail-item {
      background: white; border-radius: 15px; padding: 15px; text-align: center; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.1); transition: all 0.3s;
    }
    .cocktail-item:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(255,107,53,0.3); }
    .cocktail-name { font-weight: bold; margin-bottom: 10px; font-size: 1em; }
    .cocktail-btn { 
      width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--sunset-orange); 
      color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: all 0.2s;
      font-size: 1.1em;
    }
    .cocktail-btn:hover:not(:disabled) { background: var(--sunset-dark); transform: scale(1.05); }
    .cocktail-btn:disabled { background: #999; cursor: not-allowed; }
    .cocktail-btn.sold { 
      animation: pulse 0.6s; 
      background: var(--sunset-light) !important; 
      box-shadow: 0 0 20px rgba(255,140,96,0.6);
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    
    .price-row { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .price-display { font-weight: bold; font-size: 1.2em; color: var(--sunset-orange); min-width: 50px; }
    .price-input { width: 60px; padding: 6px; border: 2px solid #eee; border-radius: 8px; text-align: center; }
    
    .rush-bar { height: 15px; background: #eee; border-radius: 10px; margin: 25px 0; overflow: hidden; }
    .rush-progress { height: 100%; background: linear-gradient(90deg, #ff4757, var(--sunset-orange), #ffd23f); transition: width 1s ease; border-radius: 10px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 20px; margin: 20px 0; }
    .stat { text-align: center; }
    .stat-label { font-size: 0.9em; opacity: 0.8; margin-bottom: 5px; }
    .stat-value { font-size: 2.5em; font-weight: bold; color: var(--sunset-orange); line-height: 1; }
    
    .controls { text-align: center; margin: 30px 0; }
    button { 
      padding: 18px 35px; border: none; border-radius: 50px; 
      background: var(--sunset-orange); color: white; font-size: 1.1em; 
      font-weight: bold; cursor: pointer; transition: all 0.3s; margin: 0 12px;
    }
    button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,107,53,0.4); }
    
    #revenueChart { height: 300px; margin-top: 20px; }
    .suggestion { background: #fff3cd; padding: 20px; border-radius: 15px; margin: 20px 0; border-left: 6px solid var(--sunset-orange); }
    .add-drink { background: rgba(255,255,255,0.9); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
    .add-drink input { padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-right: 10px; width: 120px; }
  </style>
</head>
<body>
  <div class="customers" id="customers"></div>
  
  <div class="container">
    <h1>🍹 Bar Revenue Simulator PRO</h1>
    
    <div class="dashboard">
      <!-- Cocktail + Controlli -->
      <div class="card">
        <h3>🍸 Menu & Setup</h3>
        
        <!-- Add Drink -->
        <div class="add-drink">
          <input id="newName" placeholder="Nome drink">
          <input id="newCost" type="number" step="0.01" placeholder="Costo €">
          <input id="newPrice" type="number" step="0.1" placeholder="Prezzo €">
          <button onclick="addDrink()">➕</button>
        </div>
        
        <div class="cocktail-grid" id="cocktailGrid"></div>
        
        <div class="controls">
          <label>👥 Clienti/ora: <input type="range" id="clientRange" min="20" max="200" value="80" style="width: 180px;"></label>
          <span id="clientNum">80</span>
          <br><br>
          <button onclick="startNight()" id="startBtn">🚀 AVVIA NOTTE</button>
          <button onclick="endNight()" id="endBtn" disabled>⏹️ FINISCI</button>
        </div>
        <div class="rush-bar">
          <div class="rush-progress" id="rushBar" style="width: 50%"></div>
        </div>
        <small>🔴 Rush Hour (più rosso = più clienti!)</small>
      </div>
      
      <!-- Stats LIVE -->
      <div class="card">
        <h3>📊 LIVE STATS</h3>
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">RICAVO</div>
            <span class="stat-value" id="revenue">€0</span>
          </div>
          <div class="stat">
            <div class="stat-label">VENDUTI</div>
            <span class="stat-value" id="sold">0</span>
          </div>
          <div class="stat">
            <div class="stat-label">PROFITTO</div>
            <span class="stat-value" id="profit">€0</span>
          </div>
          <div class="stat">
            <div class="stat-label">TEMPO</div>
            <span class="stat-value" id="timeLeft">--</span>
          </div>
        </div>
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
    
    <div class="card">
      <h3>🤖 AI TIPS</h3>
      <div id="suggestions"></div>
      <div style="margin-top: 25px; text-align: center;">
        <button onclick="saveStrategy()">💾 Salva Strategia</button>
        <button onclick="loadStrategy()">📂 Carica</button>
        <button onclick="resetAll()">🔄 Reset Totale</button>
      </div>
    </div>
  </div>

  <script>
    let cocktails = JSON.parse(localStorage.getItem('barCocktails')) || [
      { name: 'Negroni', cost: 2.10, basePrice: 12, stock: 45 },
      { name: 'Aperol Spritz', cost: 1.80, basePrice: 10, stock: 32 },
      { name: 'Gin Tonic', cost: 1.50, basePrice: 9, stock: 28 },
      { name: 'Moscow Mule', cost: 2.30, basePrice: 11, stock: 22 },
      { name: 'Margarita', cost: 2.00, basePrice: 12, stock: 18 }
    ];
    
    let gameState = JSON.parse(localStorage.getItem('barGameState')) || {
      revenue: 0, sold: 0, profit: 0, nightTime: 0, prices: {}, rushLevel: 50, isRunning: false
    };
    
    let chart, gameInterval, rushInterval;
    
    function init() {
      console.log('🚀 Inizializzazione...');
      renderCocktails();
      updateClientNum();
      setupChart();
      updateStats();
      updateRush();
      
      // Rush continuo
      rushInterval = setInterval(updateRush, 1200);
      
      document.getElementById('clientRange').addEventListener('input', function() {
        updateClientNum();
        updateStats();
      });
      
      console.log('✅ Inizializzazione completata');
    }
    
    function renderCocktails() {
      const grid = document.getElementById('cocktailGrid');
      grid.innerHTML = cocktails.map((c, i) => `
        <div class="cocktail-item">
          <div class="cocktail-name">${c.name}</div>
          <button class="cocktail-btn ${c.stock <= 0 ? 'disabled' : ''}" 
                  onclick="sellCocktail(${i})">
            ${c.stock > 0 ? `🍹 Serve` : '❌ OUT'}
          </button>
          <div class="price-row">
            <span class="price-display">€${(gameState.prices[i] || c.basePrice).toFixed(1)}</span>
            <input class="price-input" type="number" step="0.1" min="3" max="25" 
                   value="${gameState.prices[i] || c.basePrice}" 
                   onchange="updatePrice(${i}, this.value)">
          </div>
          <small style="color: #666;">Stock: ${c.stock}</small>
        </div>
      `).join('');
    }
    
    function sellCocktail(i) {
      if (cocktails[i].stock <= 0 || !gameState.isRunning) {
        if (navigator.vibrate) navigator.vibrate(100);
        return;
      }
      
      // Effetti vendita
      const btn = event.target;
      btn.style.transform = 'scale(0.95)';
      btn.classList.add('sold');
      
      cocktails[i].stock--;
      const price = gameState.prices[i] || cocktails[i].basePrice;
      gameState.revenue += price;
      gameState.profit += (price - cocktails[i].cost);
      gameState.sold++;
      
      // 👥 ANIMAZIONE CLIENTE
      createCustomer();
      
      setTimeout(() => {
        btn.classList.remove('sold');
        btn.style.transform = '';
      }, 400);
      
      renderCocktails();
      updateStats();
      saveGameState();
      
      if (navigator.vibrate) navigator.vibrate(50);
    }
    
    function createCustomer() {
      const customersDiv = document.getElementById('customers');
      const customer = document.createElement('div');
      const emojis = ['👨', '👩', '👨‍🦱', '👩‍🦰', '🧔', '👵', '🧑‍🦰'];
      customer.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
      customer.className = 'customer';
      customer.style.left = Math.random() * 80 + 10 + '%';
      customer.style.top = (Math.random() * 40 + 10) + '%';
      customersDiv.appendChild(customer);
      
      setTimeout(() => {
        if (customer.parentNode) customer.remove();
      }, 2500);
    }
    
    function startNight() {
      gameState.isRunning = true;
      gameState.nightTime = 180; // 3 minuti
      
      document.getElementById('startBtn').disabled = true;
      document.getElementById('endBtn').disabled = false;
      
      console.log('🌙 Notte iniziata!');
      gameLoop();
    }
    
    function gameLoop() {
      gameInterval = setInterval(() => {
        if (gameState.nightTime <= 0) {
          endNight();
          return;
        }
        
        gameState.nightTime--;
        const minutes = Math.floor(gameState.nightTime / 60);
        const seconds = (gameState.nightTime % 60).toString().padStart(2, '0');
        document.getElementById('timeLeft').textContent = `${minutes}:${seconds}`;
        
        // Clienti automatici
        const baseClients = parseInt(document.getElementById('clientRange').value);
        const clients = Math.floor((Math.random() * 25 + baseClients / 2) * (gameState.rushLevel / 100));
        
        for (let i = 0; i < clients; i++) {
          if (Math.random() < 0.4) { // 40% chance
            sellRandomCocktail();
          }
        }
        
        updateStats();
      }, 1000);
    }
    
    function endNight() {
      gameState.isRunning = false;
      clearInterval(gameInterval);
      
      document.getElementById('startBtn').disabled = false;
      document.getElementById('endBtn').disabled = true;
      
      showReport();
      console.log('🌙 Notte finita!');
    }
    
    function sellRandomCocktail() {
      const available = cocktails.map((c, i) => c.stock > 0 ? i : -1).filter(i => i >= 0);
      if (available.length > 0) {
        const randomIdx = available[Math.floor(Math.random() * available.length)];
        sellCocktail(randomIdx);
      }
    }
    
    function updatePrice(i, price) {
      gameState.prices[i] = parseFloat(price);
      renderCocktails();
      updateStats();
      saveGameState();
    }
    
    function updateClientNum() {
      document.getElementById('clientNum').textContent = document.getElementById('clientRange').value;
    }
    
    function updateRush() {
      gameState.rushLevel = Math.abs(Math.sin(Date.now() / 10000)) * 100;
      document.getElementById('rushBar').style.width = gameState.rushLevel + '%';
    }
    
    function setupChart() {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'doughnut',
        data: { 
          labels: ['💰 Ricavo', '⭐ Profitto'], 
          datasets: [{ 
            data: [0, 0], 
            backgroundColor: ['#ff6b35', '#ffd23f'],
            borderWidth: 0
          }] 
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false,
          plugins: { 
            legend: { position: 'bottom', labels: { padding: 20 } }
          }
        }
      });
    }
    
    function updateStats() {
      // LIVE UPDATE - Ora funziona!
      document.getElementById('revenue').textContent = '€' + Math.floor(gameState.revenue);
      document.getElementById('sold').textContent = gameState.sold.toLocaleString();
      document.getElementById('profit').textContent = '€' + Math.floor(gameState.profit);
      
      // Aggiorna grafico
      if (chart) {
        chart.data.datasets[0].data = [gameState.revenue, gameState.profit];
        chart.update('none'); // Super veloce
      }
      
      // AI Tips
      const bestCocktail = cocktails.reduce((best, c, i) => {
        const margin = ((gameState.prices[i] || c.basePrice) / c.cost);
        return margin > best.margin ? { margin, i, name: c.name } : best;
      }, { margin: 0, i: 0, name: '' });
      
      document.getElementById('suggestions').innerHTML = `
        <div class="suggestion">
          🤖 <strong>AI TIP:</strong> ${bestCocktail.name}<br>
          Margine: ${(bestCocktail.margin*100).toFixed(0)}% ⭐<br>
          <small>Aumenta del 10% per +€${Math.round(gameState.revenue * 0.08)}</small>
        </div>
      `;
    }
    
    function showReport() {
      const margin = ((gameState.profit / gameState.revenue) * 100 || 0).toFixed(1);
      document.getElementById('suggestions').innerHTML += `
        <div class="suggestion" style="background: #d4edda; border-left-color: #28a745;">
          <h4>🎉 REPORT NOTTE</h4>
          <p>💰 Ricavo: €${Math.floor(gameState.revenue)}</p>
          <p>⭐ Profitto: €${Math.floor(gameState.profit)} (${margin}%)</p>
          <p>🍹 Media: €${(gameState.profit / Math.max(gameState.sold, 1)).toFixed(2)}/drink</p>
        </div>
      `;
    }
    
    function addDrink() {
      const name = document.getElementById('newName').value.trim();
      const cost = parseFloat(document.getElementById('newCost').value) || 1.5;
      const price = parseFloat(document.getElementById('newPrice').value) || 8;
      
      if (name && cost > 0 && price > cost * 2) {
        cocktails.push({ name, cost, basePrice: price, stock: 30 });
        gameState.prices[cocktails.length - 1] = price;
        saveGameState();
        renderCocktails();
        updateStats();
        
        document.getElementById('newName').value = '';
        document.getElementById('newCost').value = '';
        document.getElementById('newPrice').value = '';
      } else {
        alert('Nome richiesto e prezzo > costo x2!');
      }
    }
    
    function saveGameState() {
      localStorage.setItem('barCocktails', JSON.stringify(cocktails));
      localStorage.setItem('barGameState', JSON.stringify(gameState));
    }
    
    function saveStrategy() { 
      localStorage.setItem('barStrategy', JSON.stringify(gameState.prices)); 
      alert('✅ Strategia salvata!'); 
    }
    
    function loadStrategy() { 
      const saved = localStorage.getItem('barStrategy');
      if (saved) {
        Object.assign(gameState.prices, JSON.parse(saved));
        renderCocktails();
        updateStats();
        alert('✅ Strategia caricata!');
      }
    }
    
    function resetAll() { 
      if (confirm('Resettare tutto?')) {
        Object.assign(gameState, {revenue: 0, sold: 0, profit: 0, nightTime: 0, prices: {}, rushLevel: 50, isRunning: false});
        cocktails.forEach(c => c.stock = 30);
        localStorage.clear();
        renderCocktails();
        updateStats();
      }
    }
    
    // START
    window.addEventListener('load', init);
  </script>
</body>
</html>
