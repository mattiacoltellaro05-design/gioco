<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Revenue Simulator - FUNZIONANTE</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --sunset-orange: #ff6b35;
      --sunset-dark: #e55a30;
      --sunset-light: #ff8e60;
      --bg-gold: #fdf2e9;
      --card-bg: #fff8f0;
      --text-dark: #2c1b12;
      --shadow: 0 8px 32px rgba(255,107,53,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, var(--bg-gold), #ffe8d6);
      min-height: 100vh; 
      color: var(--text-dark);
    }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { 
      text-align: center; font-size: 2.5em; 
      background: linear-gradient(45deg, var(--sunset-orange), var(--sunset-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 30px; 
    }
    
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
    
    .card { 
      background: var(--card-bg); border-radius: 20px; padding: 25px; 
      box-shadow: var(--shadow); 
    }
    
    .cocktail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
    .cocktail-item {
      background: white; border-radius: 15px; padding: 15px; text-align: center; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.1); transition: all 0.3s;
    }
    .cocktail-item:hover { transform: translateY(-5px); }
    .cocktail-name { font-weight: bold; margin-bottom: 10px; }
    .cocktail-btn { 
      width: 100%; padding: 12px; border: none; border-radius: 10px; 
      background: var(--sunset-orange); color: white; font-weight: bold; 
      cursor: pointer; margin-bottom: 10px; transition: all 0.2s;
    }
    .cocktail-btn:hover:not(:disabled) { background: var(--sunset-dark); }
    .cocktail-btn:disabled { background: #999; cursor: not-allowed; }
    .cocktail-btn.serving { background: var(--sunset-light); transform: scale(1.05); }
    
    .price-row { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .price-display { font-weight: bold; font-size: 1.2em; color: var(--sunset-orange); }
    .price-input { width: 60px; padding: 6px; border: 2px solid #eee; border-radius: 8px; text-align: center; }
    
    .rush-bar { height: 12px; background: #eee; border-radius: 6px; margin: 20px 0; overflow: hidden; }
    .rush-progress { height: 100%; background: linear-gradient(90deg, #ff4757, var(--sunset-orange)); transition: width 1s; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 20px; margin: 20px 0; }
    .stat { text-align: center; }
    .stat-label { font-size: 0.9em; opacity: 0.8; margin-bottom: 5px; }
    .stat-value { font-size: 2.5em; font-weight: bold; color: var(--sunset-orange); }
    
    .controls { text-align: center; margin: 25px 0; }
    button { 
      padding: 15px 30px; border: none; border-radius: 50px; 
      background: var(--sunset-orange); color: white; font-size: 1.1em; 
      font-weight: bold; cursor: pointer; margin: 0 10px; transition: all 0.3s;
    }
    button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,107,53,0.3); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    
    #revenueChart { height: 280px; margin-top: 15px; }
    .suggestion { background: #fff3cd; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid var(--sunset-orange); }
    .add-drink { background: rgba(255,255,255,0.9); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .add-drink input { padding: 8px; border: 2px solid #eee; border-radius: 6px; margin-right: 8px; width: 100px; }
    .status { padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center; font-weight: bold; }
    .running { background: #d4edda; color: #155724; }
    .stopped { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍹 Bar Revenue Simulator</h1>
    
    <div class="status stopped" id="status">⏹️ Notte Fermata</div>
    
    <div class="dashboard">
      <!-- Cocktail -->
      <div class="card">
        <h3>🍸 Menu Cocktail</h3>
        
        <!-- Aggiungi drink -->
        <div class="add-drink">
          <input id="newName" placeholder="Nome">
          <input id="newCost" type="number" step="0.01" placeholder="Costo">
          <input id="newPrice" type="number" step="0.1" placeholder="Prezzo">
          <button onclick="addDrink()">➕</button>
        </div>
        
        <div class="cocktail-grid" id="cocktailGrid"></div>
        
        <div class="rush-bar">
          <div class="rush-progress" id="rushBar" style="width: 50%"></div>
        </div>
        <small>Rush Hour: più rosso = più clienti</small>
      </div>
      
      <!-- Stats -->
      <div class="card">
        <h3>📊 Stats LIVE</h3>
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">RICAVO</div>
            <span class="stat-value" id="revenue">€0</span>
          </div>
          <div class="stat">
            <div class="stat-label">VENDUTI</div>
            <span class="stat-value" id="sold">0</span>
          </div>
          <div class="stat">
            <div class="stat-label">PROFITTO</div>
            <span class="stat-value" id="profit">€0</span>
          </div>
          <div class="stat">
            <div class="stat-label">TEMPO</div>
            <span class="stat-value" id="timeLeft">3:00</span>
          </div>
        </div>
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
    
    <div class="card">
      <div class="controls">
        <label>👥 Clienti/ora: 
          <input type="range" id="clientRange" min="20" max="200" value="80" style="width: 200px;">
          <span id="clientNum">80</span>
        </label><br><br>
        <button onclick="startNight()" id="startBtn">🚀 AVVIA NOTTE</button>
        <button onclick="endNight()" id="endBtn" disabled>⏹️ STOP</button>
        <button onclick="resetAll()" style="background: #6c757d;">🔄 RESET</button>
      </div>
      <div id="suggestions"></div>
    </div>
  </div>

  <script>
    // DATI
    let cocktails = [
      { name: 'Negroni', cost: 2.10, basePrice: 12, stock: 45 },
      { name: 'Aperol Spritz', cost: 1.80, basePrice: 10, stock: 32 },
      { name: 'Gin Tonic', cost: 1.50, basePrice: 9, stock: 28 },
      { name: 'Moscow Mule', cost: 2.30, basePrice: 11, stock: 22 },
      { name: 'Margarita', cost: 2.00, basePrice: 12, stock: 18 }
    ];
    
    let gameState = {
      revenue: 0,
      sold: 0, 
      profit: 0,
      nightTime: 180,
      prices: {},
      rushLevel: 50,
      isRunning: false
    };
    
    let chart, gameLoopInterval, rushInterval;
    
    // INIZIO
    function init() {
      renderCocktails();
      setupChart();
      updateStats();
      updateRush();
      
      document.getElementById('clientRange').addEventListener('input', function() {
        document.getElementById('clientNum').textContent = this.value;
      });
      
      rushInterval = setInterval(updateRush, 1500);
    }
    
    function renderCocktails() {
      const grid = document.getElementById('cocktailGrid');
      grid.innerHTML = cocktails.map((cocktail, i) => `
        <div class="cocktail-item">
          <div class="cocktail-name">${cocktail.name}</div>
          <button class="cocktail-btn ${cocktail.stock <= 0 ? 'disabled' : ''}" 
                  onclick="sellCocktail(${i})">
            ${cocktail.stock > 0 ? '🍹 SERVI' : '❌ OUT'}
          </button>
          <div class="price-row">
            <span class="price-display">€${(gameState.prices[i] || cocktail.basePrice).toFixed(1)}</span>
            <input class="price-input" type="number" step="0.1" min="3" max="25" 
                   value="${gameState.prices[i] || cocktail.basePrice}" onchange="updatePrice(${i}, this.value)">
          </div>
          <div style="font-size: 0.8em; color: #666;">Stock: ${cocktail.stock}</div>
        </div>
      `).join('');
    }
    
    function sellCocktail(index) {
      if (cocktails[index].stock <= 0 || !gameState.isRunning) return;
      
      // ANIMAZIONE BOTTONE
      const btn = event.target;
      btn.textContent = 'SERVED!';
      btn.classList.add('serving');
      
      // CALCOLI
      cocktails[index].stock--;
      const price = gameState.prices[index] || cocktails[index].basePrice;
      gameState.revenue += price;
      gameState.profit += (price - cocktails[index].cost);
      gameState.sold++;
      
      setTimeout(() => {
        btn.textContent = cocktails[index].stock > 0 ? '🍹 SERVI' : '❌ OUT';
        btn.classList.remove('serving');
      }, 300);
      
      renderCocktails();
      updateStats();
    }
    
    function startNight() {
      gameState.isRunning = true;
      document.getElementById('status').textContent = '▶️ Notte IN CORSO';
      document.getElementById('status').className = 'status running';
      document.getElementById('startBtn').disabled = true;
      document.getElementById('endBtn').disabled = false;
      
      gameLoop();
    }
    
    function gameLoop() {
      gameLoopInterval = setInterval(() => {
        if (gameState.nightTime <= 0) {
          endNight();
          return;
        }
        
        gameState.nightTime--;
        const mins = Math.floor(gameState.nightTime / 60);
        const secs = (gameState.nightTime % 60).toString().padStart(2, '0');
        document.getElementById('timeLeft').textContent = `${mins}:${secs}`;
        
        // CLIENTI AUTOMATICI
        const clientsPerSec = parseInt(document.getElementById('clientRange').value) / 60;
        if (Math.random() < clientsPerSec * gameState.rushLevel / 100) {
          sellRandomCocktail();
        }
        
        updateStats();
      }, 1000);
    }
    
    function endNight() {
      gameState.isRunning = false;
      clearInterval(gameLoopInterval);
      document.getElementById('status').textContent = '⏹️ Notte Fermata';
      document.getElementById('status').className = 'status stopped';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('endBtn').disabled = true;
      
      showReport();
    }
    
    function sellRandomCocktail() {
      const available = cocktails.map((c, i) => c.stock > 0 ? i : -1).filter(i => i >= 0);
      if (available.length > 0) {
        sellCocktail(available[Math.floor(Math.random() * available.length)]);
      }
    }
    
    function updatePrice(i, price) {
      gameState.prices[i] = parseFloat(price);
      updateStats();
    }
    
    function updateRush() {
      gameState.rushLevel = (Math.sin(Date.now() / 8000) * 0.5 + 0.5) * 100;
      document.getElementById('rushBar').style.width = gameState.rushLevel + '%';
    }
    
    function setupChart() {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Ricavo', 'Profitto'],
          datasets: [{
            data: [0, 0],
            backgroundColor: ['#ff6b35', '#ffd23f']
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });
    }
    
    function updateStats() {
      document.getElementById('revenue').textContent = '€' + Math.floor(gameState.revenue);
      document.getElementById('sold').textContent = gameState.sold;
      document.getElementById('profit').textContent = '€' + Math.floor(gameState.profit);
      
      if (chart) {
        chart.data.datasets[0].data = [gameState.revenue, gameState.profit];
        chart.update('none');
      }
      
      // AI TIP
      let bestMargin = 0;
      let bestName = '';
      cocktails.forEach((c, i) => {
        const margin = ((gameState.prices[i] || c.basePrice) / c.cost);
        if (margin > bestMargin) {
          bestMargin = margin;
          bestName = c.name;
        }
      });
      
      document.getElementById('suggestions').innerHTML = `
        <div class="suggestion">
          🤖 <strong>TIP:</strong> ${bestName} (${(bestMargin*100).toFixed(0)}% margine)
          <br><small>+10% prezzo = +€${Math.round(gameState.revenue*0.08)}</small>
        </div>
      `;
    }
    
    function showReport() {
      const totalMargin = gameState.profit / gameState.revenue * 100 || 0;
      document.getElementById('suggestions').innerHTML += `
        <div class="suggestion" style="background: #d4edda;">
          <strong>📊 REPORT</strong><br>
          Ricavo: €${Math.floor(gameState.revenue)}<br>
          Profitto: €${Math.floor(gameState.profit)} (${totalMargin.toFixed(1)}%)<br>
          Media: €${(gameState.profit/gameState.sold || 0).toFixed(2)}/drink
        </div>
      `;
    }
    
    function addDrink() {
      const name = document.getElementById('newName').value.trim();
      const cost = parseFloat(document.getElementById('newCost').value) || 1.5;
      const price = parseFloat(document.getElementById('newPrice').value) || 8;
      
      if (name && price > cost * 2) {
        cocktails.push({ name, cost, basePrice: price, stock: 30 });
        renderCocktails();
        document.getElementById('newName').value = '';
        document.getElementById('newCost').value = '';
        document.getElementById('newPrice').value = '';
      }
    }
    
    function resetAll() {
      if (confirm('Reset totale?')) {
        gameState = { revenue: 0, sold: 0, profit: 0, nightTime: 180, prices: {}, rushLevel: 50, isRunning: false };
        cocktails.forEach(c => c.stock = 30);
        renderCocktails();
        updateStats();
      }
    }
    
    // AVVIO
    window.onload = init;
  </script>
</body>
</html>
