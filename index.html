<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Revenue Simulator ✓</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      background: linear-gradient(135deg, #fdf2e9, #ffe8d6);
      min-height: 100vh; padding: 10px; color: #2c1b12;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 { text-align: center; font-size: clamp(1.5em, 6vw, 2.8em); 
         background: linear-gradient(45deg, #ff6b35, #ff8e60); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
         margin: 15px 0; }
    
    .status { padding: 12px; border-radius: 12px; margin: 0 0 20px 0; text-align: center; font-weight: bold; font-size: 1.1em; }
    .running { background: #d4edda; color: #155724; }
    .stopped { background: #f8d7da; color: #721c24; }
    
    .dashboard { display: grid; gap: 20px; }
    @media (min-width: 700px) { .dashboard { grid-template-columns: 1fr 1fr; } }
    
    .card { background: #fff8f0; border-radius: 16px; padding: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .cocktail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 15px 0; }
    .cocktail-item { background: white; border-radius: 12px; padding: 12px; text-align: center; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
    .cocktail-name { font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
    .cocktail-btn { width: 100%; padding: 10px 6px; border: none; border-radius: 8px; background: #ff6b35; color: white; font-weight: bold; cursor: pointer; margin-bottom: 6px; }
    .cocktail-btn:hover:not(:disabled) { background: #e55a30; }
    .cocktail-btn:disabled { background: #ccc; cursor: not-allowed; }
    .cocktail-btn.serving { background: #ff8e60 !important; animation: pulse 0.3s; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .price-row { display: flex; gap: 4px; align-items: center; justify-content: center; font-size: 0.85em; }
    .price-display { font-weight: bold; color: #ff6b35; min-width: 40px; }
    .price-input { width: 50px; padding: 3px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 0.85em; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; margin: 15px 0; }
    .stat { text-align: center; }
    .stat-label { font-size: 0.75em; opacity: 0.8; margin-bottom: 2px; }
    .stat-value { font-size: clamp(1.4em, 6vw, 2.2em); font-weight: bold; color: #ff6b35; }
    
    .controls { text-align: center; padding: 20px; background: rgba(255,255,255,0.6); border-radius: 12px; margin-top: 20px; }
    button { padding: 12px 20px; border: none; border-radius: 25px; background: #ff6b35; color: white; font-weight: bold; cursor: pointer; margin: 0 8px 8px 0; font-size: 0.95em; }
    button:hover:not(:disabled) { background: #e55a30; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .rush-bar { height: 8px; background: #eee; border-radius: 4px; margin: 12px auto; width: 90%; overflow: hidden; }
    .rush-progress { height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b35); transition: width 1s ease; }
    
    #revenueChart { height: 220px; width: 100%; margin-top: 10px; }
    .suggestion { background: #fff3cd; padding: 12px; border-radius: 8px; margin: 12px 0; border-left: 4px solid #ff6b35; font-size: 0.9em; }
    .add-drink { background: rgba(255,255,255,0.8); border-radius: 10px; padding: 12px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .add-drink input { padding: 6px; border: 1px solid #ddd; border-radius: 5px; flex: 1; min-width: 70px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍹 Bar Revenue</h1>
    
    <div class="status stopped" id="status">⏹️ Notte Fermata</div>
    
    <div class="dashboard">
      <div class="card">
        <h3 style="margin-bottom: 15px;">🍸 Menu</h3>
        <div class="add-drink">
          <input id="newName" placeholder="Drink">
          <input id="newCost" type="number" step="0.01" placeholder="Costo">
          <input id="newPrice" type="number" step="0.1" placeholder="Prezzo">
          <button onclick="addDrink()">➕</button>
        </div>
        <div class="cocktail-grid" id="cocktailGrid"></div>
        <div class="rush-bar"><div class="rush-progress" id="rushBar" style="width: 50%"></div></div>
        <small>Rush Hour: più rosso = più clienti</small>
      </div>
      
      <div class="card">
        <h3 style="margin-bottom: 15px;">📊 LIVE</h3>
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">RICAVO</div>
            <span class="stat-value" id="revenue">€0</span>
          </div>
          <div class="stat">
            <div class="stat-label">VENDUTI</div>
            <span class="stat-value" id="sold">0</span>
          </div>
          <div class="stat">
            <div class="stat-label">PROFITTO</div>
            <span class="stat-value" id="profit">€0</span>
          </div>
          <div class="stat">
            <div class="stat-label">TEMPO</div>
            <span class="stat-value" id="timeLeft">3:00</span>
          </div>
        </div>
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
    
    <div class="card">
      <div class="controls">
        <div style="margin-bottom: 15px;">
          👥 <input type="range" id="clientRange" min="20" max="200" value="80" style="width: 200px;"> 
          <span id="clientNum">80</span>
        </div>
        <button onclick="startNight()" id="startBtn">🚀 AVVIA</button>
        <button onclick="endNight()" id="endBtn" disabled>⏹️ STOP</button>
        <button onclick="resetAll()" style="background: #6c757d;">🔄 RESET</button>
        <div id="suggestions"></div>
      </div>
    </div>
  </div>

  <script>
    let cocktails = [
      { name: 'Negroni', cost: 2.10, basePrice: 12, stock: 45 },
      { name: 'Aperol Spritz', cost: 1.80, basePrice: 10, stock: 32 },
      { name: 'Gin Tonic', cost: 1.50, basePrice: 9, stock: 28 },
      { name: 'Moscow Mule', cost: 2.30, basePrice: 11, stock: 22 },
      { name: 'Margarita', cost: 2.00, basePrice: 12, stock: 18 }
    ];
    
    let gameState = { revenue: 0, sold: 0, profit: 0, nightTime: 180, prices: {}, rushLevel: 50, isRunning: false };
    let chart, gameInterval;
    
    function init() {
      renderCocktails();
      setupChart();
      updateStats();
      document.getElementById('clientRange').addEventListener('input', e => {
        document.getElementById('clientNum').textContent = e.target.value;
      });
      setInterval(updateRush, 1500);
    }
    
    function renderCocktails() {
      document.getElementById('cocktailGrid').innerHTML = cocktails.map((c, i) => `
        <div class="cocktail-item">
          <div class="cocktail-name">${c.name}</div>
          <button class="cocktail-btn ${c.stock <= 0 ? 'disabled' : ''}" onclick="sellCocktail(${i})">
            ${c.stock > 0 ? '🍹 SERVI' : '❌ OUT'}
          </button>
          <div class="price-row">
            <span class="price-display">€${(gameState.prices[i] || c.basePrice).toFixed(1)}</span>
            <input class="price-input" type="number" step="0.1" min="3" max="25" 
                   value="${gameState.prices[i] || c.basePrice}" onchange="updatePrice(${i}, this.value)">
          </div>
          <div style="font-size: 0.8em; color: #666;">${c.stock}</div>
        </div>
      `).join('');
    }
    
    function sellCocktail(i) {
      if (cocktails[i].stock <= 0 || !gameState.isRunning) return;
      
      const btn = event.target;
      btn.classList.add('serving');
      btn.textContent = 'SERVED!';
      
      cocktails[i].stock--;
      const price = gameState.prices[i] || cocktails[i].basePrice;
      gameState.revenue += price;
      gameState.profit += price - cocktails[i].cost;
      gameState.sold++;
      
      setTimeout(() => {
        btn.textContent = cocktails[i].stock > 0 ? '🍹 SERVI' : '❌ OUT';
        btn.classList.remove('serving');
      }, 300);
      
      updateStats();
      renderCocktails();
    }
    
    function startNight() {
      gameState.isRunning = true;
      document.getElementById('status').textContent = '▶️ CORRENDO';
      document.getElementById('status').className = 'status running';
      document.getElementById('startBtn').disabled = true;
      document.getElementById('endBtn').disabled = false;
      
      gameInterval = setInterval(() => {
        if (gameState.nightTime <= 0) return endNight();
        
        gameState.nightTime--;
        const mins = Math.floor(gameState.nightTime / 60);
        const secs = (gameState.nightTime % 60).toString().padStart(2, '0');
        document.getElementById('timeLeft').textContent = `${mins}:${secs}`;
        
        const chance = (parseInt(document.getElementById('clientRange').value) / 200) * (gameState.rushLevel / 100);
        if (Math.random() < chance) sellRandomCocktail();
        
        updateStats();
      }, 800);
    }
    
    function endNight() {
      gameState.isRunning = false;
      clearInterval(gameInterval);
      document.getElementById('status').textContent = '⏹️ Fermata';
      document.getElementById('status').className = 'status stopped';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('endBtn').disabled = true;
      showReport();
    }
    
    function sellRandomCocktail() {
      const available = cocktails.map((c, i) => c.stock > 0 ? i : -1).filter(i => i >= 0);
      if (available.length) sellCocktail(available[Math.floor(Math.random() * available.length)]);
    }
    
    function updatePrice(i, price) {
      gameState.prices[i] = parseFloat(price);
      updateStats();
    }
    
    function updateRush() {
      gameState.rushLevel = Math.abs(Math.sin(Date.now() / 4000)) * 100;
      document.getElementById('rushBar').style.width = gameState.rushLevel + '%';
    }
    
    function setupChart() {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['Ricavo', 'Profitto'], datasets: [{ data: [0, 0], backgroundColor: ['#ff6b35', '#ffd23f'] }] },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }
    
    function updateStats() {
      document.getElementById('revenue').textContent = '€' + Math.floor(gameState.revenue);
      document.getElementById('sold').textContent = gameState.sold;
      document.getElementById('profit').textContent = '€' + Math.floor(gameState.profit);
      
      if (chart) {
        chart.data.datasets[0].data = [gameState.revenue, gameState.profit];
        chart.update('none');
      }
      
      const best = cocktails.reduce((best, c, i) => {
        const margin = ((gameState.prices[i] || c.basePrice) / c.cost);
        return margin > best.margin ? {margin, name: c.name} : best;
      }, {margin: 0, name: ''});
      
      document.getElementById('suggestions').innerHTML = `<div class="suggestion">🤖 ${best.name}: ${(best.margin*100).toFixed(0)}%</div>`;
    }
    
    function showReport() {
      document.getElementById('suggestions').innerHTML += `<div class="suggestion" style="background:#d4edda;">📊 €${Math.floor(gameState.revenue)} | Profitto €${Math.floor(gameState.profit)}</div>`;
    }
    
    function addDrink() {
      const name = document.getElementById('newName').value.trim();
      const cost = parseFloat(document.getElementById('newCost').value) || 1.5;
      const price = parseFloat(document.getElementById('newPrice').value) || 8;
      if (name && price > cost * 2) {
        cocktails.push({name, cost, basePrice: price, stock: 30});
        document.getElementById('newName').value = '';
        document.getElementById('newCost').value = '';
        document.getElementById('newPrice').value = '';
        renderCocktails();
      }
    }
    
    function resetAll() {
      if (confirm('Reset?')) {
        gameState = {revenue: 0, sold: 0, profit: 0, nightTime: 180, prices: {}, rushLevel: 50, isRunning: false};
        cocktails.forEach(c => c.stock = 30);
        renderCocktails();
        updateStats();
      }
    }
    
    window.onload = init;
  </script>
</body>
</html>
