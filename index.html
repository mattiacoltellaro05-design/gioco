<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymApp - Allenati Smart</title>
    <style>
        /* Stile moderno Apple: tenui, arrotondati */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #1c1c1e; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #007aff; margin-bottom: 30px; font-size: 2.5em; }
        nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        button { background: #007aff; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-size: 1em; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }
        button:hover { background: #0056cc; transform: translateY(-2px); }
        button.secondary { background: #e5e5ea; color: #1c1c1e; }
        button.secondary:hover { background: #d1d1d6; }
        #muscle-map { width: 100%; height: 400px; margin: 20px 0; cursor: pointer; }
        .section { display: none; background: white; border-radius: 20px; padding: 30px; margin: 20px 0; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .section.active { display: block; }
        .exercise { display: flex; gap: 20px; margin-bottom: 20px; padding: 20px; background: #f2f2f7; border-radius: 16px; }
        .exercise img { width: 150px; height: 150px; border-radius: 12px; }
        .add-exercise { margin-top: 20px; }
        input, select { padding: 12px; border: 1px solid #d1d1d6; border-radius: 12px; margin: 5px; }
        #workout-screen { text-align: center; font-size: 4em; background: linear-gradient(135deg, #34c759, #30d158); color: white; border-radius: 20px; padding: 50px; }
        #timer { font-size: 6em; font-weight: bold; margin: 20px 0; }
        #reps { font-size: 2em; }
        #current-exercise { font-size: 1.5em; margin-bottom: 20px; }
        .muscle-label { position: absolute; font-weight: bold; color: #007aff; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💪 GymApp</h1>
        <nav>
            <button onclick="showSection('home')">🏠 Home</button>
            <button onclick="showSection('muscles')">Mappa Muscoli</button>
            <button onclick="showSection('exercises')">Esercizi</button>
            <button onclick="showSection('workouts')">Schede</button>
            <button onclick="startWorkout()">▶️ Inizia</button>
        </nav>

        <!-- Mappa muscoli interattiva SVG semplificata -->
        <div id="home" class="section active">
            <svg id="muscle-map" viewBox="0 0 300 600">
                <!-- Corpo semplificato uomo, aree cliccabili per muscoli -->
                <!-- Testa --> <circle cx="150" cy="50" r="40" fill="#f8f8f8" stroke="#1c1c1e"/>
                <!-- Torso --> <rect x="100" y="90" width="100" height="150" rx="50" fill="#e8f4fd" stroke="#007aff" stroke-width="2" onclick="filterMuscle('petto')"/>
                <!-- Spalle --> <path d="M80 120 Q150 80 220 120" fill="#e8f4fd" stroke="#007aff" stroke-width="2" onclick="filterMuscle('spalle')"/>
                <!-- Braccia --> <rect x="50" y="130" width="30" height="100" rx="15" fill="#f0f0f0" stroke="#5856d6" stroke-width="2" onclick="filterMuscle('braccia')"/>
                <rect x="220" y="130" width="30" height="100" rx="15" fill="#f0f0f0" stroke="#5856d6" stroke-width="2" onclick="filterMuscle('braccia')"/>
                <!-- Schiena (posteriore sim) --> <rect x="100" y="90" width="100" height="150" rx="50" fill="#e8f4fd" opacity="0.7" stroke="#ff9500" stroke-width="2" onclick="filterMuscle('schiena')"/>
                <!-- Gambe --> <rect x="110" y="240" width="30" height="200" rx="15" fill="#e0f7e0" stroke="#34c759" stroke-width="2" onclick="filterMuscle('gambe')"/>
                <rect x="160" y="240" width="30" height="200" rx="15" fill="#e0f7e0" stroke="#34c759" stroke-width="2" onclick="filterMuscle('gambe')"/>
                <!-- Label -->
                <text x="150" y="115" class="muscle-label" text-anchor="middle">Petto</text>
                <text x="150" y="105" class="muscle-label" text-anchor="middle">Schiena</text>
                <text x="65" y="200" class="muscle-label" text-anchor="middle">Braccia</text>
                <text x="235" y="200" class="muscle-label" text-anchor="middle">Braccia</text>
                <text x="125" y="105" class="muscle-label" text-anchor="middle">Spalle</text>
                <text x="125" y="350" class="muscle-label" text-anchor="middle">Gambe</text>
            </svg>
        </div>

        <!-- Lista esercizi -->
        <div id="exercises" class="section">
            <h2>Esercizi Comuni</h2>
            <div id="exercise-list"></div>
            <div class="add-exercise">
                <input id="new-name" placeholder="Nome esercizio"><input id="new-desc" placeholder="Descrizione"><input id="new-img" placeholder="URL GIF"><button onclick="addExercise()">Aggiungi</button>
            </div>
        </div>

        <!-- Schede -->
        <div id="workouts" class="section">
            <h2>Schede Personalizzate</h2>
            <select id="workout-select"><option>Seleziona Scheda</option></select>
            <button onclick="createWorkout()">Nuova Scheda</button>
            <div id="workout-list"></div>
        </div>

        <!-- Schermo workout -->
        <div id="workout-screen" class="section" style="display:none;">
            <div id="current-exercise">Preparati!</div>
            <div id="timer">01:00</div>
            <div id="reps">Ripetizioni: 12</div>
            <button onclick="toggleWorkout()" id="pause-btn">⏸️ Pausa</button>
            <button onclick="stopWorkout()">⏹️ Stop</button>
        </div>
    </div>

    <script>
        // Dati esercizi comuni [web:2][web:11][web:12][web:13][web:14][web:17][web:19]
        let exercises = {
            petto: [
                {name: 'Panca Piana', desc: 'Sdraiati sulla panca, abbassa il bilanciere al petto e spingi su. 3x8-12 rep.', img: 'gifs/panca.gif'},
                {name: 'Croci ai Cavi', desc: 'Tira i cavi verso il centro del petto contraendo i pettorali. 3x12-15 rep.', img: 'gifs/croci.gif'},
                {name: 'Dip Parallele', desc: 'Scendi tra le parallele piegando i gomiti, poi spingi su. 3x10 rep.', img: 'gifs/dip.gif'}
            ],
            schiena: [
                {name: 'Trazioni', desc: 'Afferra la sbarra larga, tira su fino al mento. 4x6-8 rep.', img: 'gifs/trazioni.gif'},
                {name: 'Rematore Bilanciere', desc: 'Piega il busto, tira il bilanciere verso l\'addome. 3x10 rep.', img: 'gifs/rematore.gif'},
                {name: 'Lat Machine', desc: 'Tira la barra verso il petto con presa larga. 4x8-12 rep.', img: 'gifs/lat.gif'}
            ],
            gambe: [
                {name: 'Squat', desc: 'Scendi con i piedi larghi quanto le spalle, ginocchia all\'infuori. 4x8-10 rep.', img: 'gifs/squat.gif'},
                {name: 'Leg Extension', desc: 'Estendi le gambe sulla macchina contraendo i quadricipiti. 3x12 rep.', img: 'gifs/legext.gif'},
                {name: 'Leg Curl', desc: 'Piega le gambe sui polpacci per femorali. 3x12 rep.', img: 'gifs/legcurl.gif'}
            ],
            spalle: [
                {name: 'Military Press', desc: 'Spingi i manubri sopra la testa da seduto. 3x8-10 rep.', img: 'gifs/military.gif'},
                {name: 'Alzate Laterali', desc: 'Alza i manubri lateralmente fino all\'altezza spalle. 3x12 rep.', img: 'gifs/alzate.gif'}
            ],
            braccia: [
                {name: 'Curl Bicipiti', desc: 'Curl con manubri alternati. 3x10-12 rep.', img: 'gifs/curl.gif'},
                {name: 'French Press', desc: 'Estendi i tricipiti sopra la testa. 3x12 rep.', img: 'gifs/french.gif'}
            ]
        };
        let currentMuscle = 'petto';
        let workouts = JSON.parse(localStorage.getItem('workouts')) || [];
        let workoutIndex = 0;
        let timerInterval, timer = 60, isPaused = false, reps = 12;

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'exercises') renderExercises();
            if (id === 'workouts') renderWorkouts();
        }

        function filterMuscle(muscle) {
            currentMuscle = muscle;
            showSection('exercises');
        }

        function renderExercises() {
            const list = document.getElementById('exercise-list');
            list.innerHTML = exercises[currentMuscle].map(ex => `
                <div class="exercise">
                    <img src="${ex.img}" alt="${ex.name}" onerror="this.src='https://via.placeholder.com/150?text=${ex.name}'">
                    <div>
                        <h3>${ex.name}</h3>
                        <p>${ex.desc}</p>
                        <button onclick="addToWorkout('${ex.name}', '${ex.desc}', '${ex.img}')">Aggiungi a Scheda</button>
                    </div>
                </div>
            `).join('');
        }

        function addExercise() {
            const name = document.getElementById('new-name').value;
            const desc = document.getElementById('new-desc').value;
            const img = document.getElementById('new-img').value;
            if (name && desc) {
                exercises[currentMuscle].push({name, desc, img});
                renderExercises();
                document.getElementById('new-name').value = '';
                document.getElementById('new-desc').value = '';
                document.getElementById('new-img').value = '';
            }
        }

        function renderWorkouts() {
            const list = document.getElementById('workout-list');
            list.innerHTML = workouts.map((w, i) => `
                <div>
                    <h3>${w.name}</h3>
                    <ul>${w.exercises.map(ex => `<li>${ex.name} - ${ex.reps} rep</li>`).join('')}</ul>
                    <button onclick="startSpecificWorkout(${i})">Avvia</button>
                </div>
            `).join('');
            const select = document.getElementById('workout-select');
            select.innerHTML = '<option>Seleziona</option>' + workouts.map((w,i) => `<option value="${i}">${w.name}</option>`).join('');
        }

        function createWorkout() {
            const name = prompt('Nome Scheda:');
            if (name) {
                workouts.push({name, exercises: []});
                localStorage.setItem('workouts', JSON.stringify(workouts));
                renderWorkouts();
            }
        }

        function addToWorkout(name, desc, img) {
            if (workouts.length === 0) return alert('Crea una scheda prima!');
            const workout = workouts[workouts.length - 1];
            workout.exercises.push({name, desc, img, reps});
            localStorage.setItem('workouts', JSON.stringify(workouts));
            renderWorkouts();
        }

        function startWorkout() {
            if (workouts.length === 0) return alert('Crea una scheda!');
            workoutIndex = 0;
            document.getElementById('workout-select').selectedIndex = workouts.length;
            startSpecificWorkout(workouts.length - 1);
        }

        function startSpecificWorkout(index) {
            workoutIndex = index;
            document.querySelector('.container > nav').style.display = 'none';
            document.getElementById('workout-screen').style.display = 'block';
            nextExercise();
            startTimer();
        }

        function nextExercise() {
            const workout = workouts[workoutIndex];
            if (!workout.exercises[workoutIndex % workout.exercises.length]) return stopWorkout();
            const ex = workout.exercises[workoutIndex % workout.exercises.length];
            document.getElementById('current-exercise').textContent = ex.name;
            reps = ex.reps || 12;
            document.getElementById('reps').textContent = `Ripetizioni: ${reps}`;
            timer = 60;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (isPaused) return;
                timer--;
                document.getElementById('timer').textContent = new Date(timer * 1000).toISOString().substr(14, 5);
                if (timer <= 0) {
                    workoutIndex++;
                    nextExercise();
                }
            }, 1000);
        }

        function toggleWorkout() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').textContent = isPaused ? '▶️ Riprendi' : '⏸️ Pausa';
        }

        function stopWorkout() {
            clearInterval(timerInterval);
            document.getElementById('workout-screen').style.display = 'none';
            document.querySelector('.container > nav').style.display = 'flex';
            showSection('home');
        }

        // Init
        renderExercises();
        renderWorkouts();
    </script>
</body>
</html>
