<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymApp Pastello 💪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #fff8e1 0%, #fce4ec 50%, #e1bee7 100%); 
            color: #4a4a4a; 
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; background: rgba(255,248,225,0.9); border-radius: 24px; padding: 24px; margin-bottom: 30px; font-size: 2.5em; box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
        nav { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 30px; }
        button { 
            background: linear-gradient(135deg, #ffcdd2, #f8bbd9); color: #880e4f; border: none; padding: 14px 24px; 
            border-radius: 20px; font-weight: 500; cursor: pointer; transition: all 0.3s; 
            box-shadow: 0 6px 20px rgba(255,205,210,0.4);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,205,210,0.6); }
        button.active { background: linear-gradient(135deg, #e1bee7, #ce93d8); }
        #muscle-map { width: 100%; max-width: 400px; height: 600px; margin: 20px auto; display: block; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
        .section { display: none; background: rgba(255,255,255,0.95); border-radius: 24px; padding: 30px; margin: 20px 0; box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
        .section.active { display: block; }
        .exercise { display: flex; gap: 20px; margin-bottom: 20px; padding: 20px; background: linear-gradient(135deg, #fff3e0, #ffccbc); border-radius: 16px; }
        .exercise img { width: 140px; height: 140px; border-radius: 12px; object-fit: cover; background: #e3f2fd; }
        input { padding: 12px; border: 1px solid #f8bbd9; border-radius: 12px; margin: 5px; }
        #workout-screen { display: none; text-align: center; background: linear-gradient(135deg, #e8f5e8, #c8e6c9); color: #2e7d32; padding: 50px; border-radius: 24px; margin: 20px 0; }
        #timer { font-size: 6em; font-weight: bold; margin: 20px 0; }
        .muscle-hover { stroke-width: 5 !important; stroke: #f48fb1 !important; fill-opacity: 0.3 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💪 GymApp Pastello</h1>
        <nav>
            <button class="active" onclick="showSection('home')">🏠 Home</button>
            <button onclick="showSection('exercises')">Esercizi</button>
            <button onclick="showSection('workouts')">Schede</button>
        </nav>

        <!-- SVG Corpo stile immagine allegata: silhouette blu muscoli rossi -->
        <div id="home" class="section active">
            <svg id="muscle-map" viewBox="0 0 300 650">
                <!-- Silhouette corpo base (blu tenue) -->
                <path d="M150 50 Q170 30 190 50 Q210 70 190 100 Q170 120 150 110 Q130 120 110 100 Q90 70 110 50 Z M110 110 L110 250 Q130 270 150 260 Q170 270 190 250 L190 110" fill="#e3f2fd" stroke="#4fc3f7" stroke-width="4"/>
                <path d="M90 250 Q70 300 90 380 Q110 420 150 410 L150 500 Q130 510 110 500 Q90 480 90 450 L90 380 Z" fill="#e3f2fd" stroke="#4fc3f7" stroke-width="4"/>
                <path d="M210 250 Q230 300 210 380 Q190 420 150 410 L150 500 Q170 510 190 500 Q210 480 210 450 L210 380 Z" fill="#e3f2fd" stroke="#4fc3f7" stroke-width="4"/>
                <ellipse cx="150" cy="530" rx="40" ry="60" fill="#e3f2fd" stroke="#4fc3f7" stroke-width="4"/>

                <!-- Muscoli selezionabili stile foto (rosso tenue) -->
                <!-- Petto -->
                <path id="petto" class="muscle" d="M115 150 Q135 130 165 145 Q195 130 215 150 L215 240 Q195 255 165 245 Q135 255 115 240 Z" fill="#ffcdd2" stroke="#f48fb1" stroke-width="3" stroke-opacity="0.8" onclick="filterMuscle('petto')" onmouseenter="this.classList.add('muscle-hover')" onmouseleave="this.classList.remove('muscle-hover')"/>
                <!-- Gambe sinistra -->
                <path id="gambe" class="muscle" d="M105 410 Q95 460 105 520 Q125 550 145 540 L145 610" fill="#ffcdd2" stroke="#f48fb1" stroke-width="3" onclick="filterMuscle('gambe')" onmouseenter="this.classList.add('muscle-hover')" onmouseleave="this.classList.remove('muscle-hover')"/>
                <!-- Gambe destra -->
                <path class="muscle" d="M195 410 Q205 460 195 520 Q175 550 155 540 L155 610" fill="#ffcdd2" stroke="#f48fb1" stroke-width="3" onclick="filterMuscle('gambe')" onmouseenter="this.classList.add('muscle-hover')" onmouseleave="this.classList.remove('muscle-hover')"/>
                <!-- Braccia sinistra -->
                <path id="braccia" class="muscle" d="M95 260 Q85 320 95 370 Q115 390 135 380 L135 420" fill="#e1bee7" stroke="#9575cd" stroke-width="3" onclick="filterMuscle('braccia')" onmouseenter="this.classList.add('muscle-hover')" onmouseleave="this.classList.remove('muscle-hover')"/>
                <!-- Braccia destra -->
                <path class="muscle" d="M205 260 Q215 320 205 370 Q185 390 165 380 L165 420" fill="#e1bee7" stroke="#9575cd" stroke-width="3" onclick="filterMuscle('braccia')" onmouseenter="this.classList.add('muscle-hover')" onmouseleave="this.classList.remove('muscle-hover')"/>
                <!-- Schiena -->
                <path id="schiena" class="muscle" d="M115 150 Q150 120 185 150 L185 240 Q150 260 115 240 Z" fill="#ffccbc" stroke="#ff8a65" stroke-width="3" opacity="0.9" onclick="filterMuscle('schiena')" onmouseenter="this.classList.add('muscle-hover')" onmouseleave="this.classList.remove('muscle-hover')"/>

                <!-- Labels -->
                <text x="150" y="195" fill="#880e4f" font-weight="bold" font-size="16" text-anchor="middle" opacity="0.8">Petto</text>
                <text x="95" y="480" fill="#880e4f" font-weight="bold" font-size="14" text-anchor="middle">Gambe</text>
                <text x="205" y="480" fill="#880e4f" font-weight="bold" font-size="14" text-anchor="middle">Gambe</text>
                <text x="75" y="340" fill="#7b1fa2" font-weight="bold" font-size="14" text-anchor="end">Braccia</text>
                <text x="225" y="340" fill="#7b1fa2" font-weight="bold" font-size="14" text-anchor="start">Braccia</text>
                <text x="150" y="195" fill="#ef6c00" font-weight="bold" font-size="14" text-anchor="middle" opacity="0.8">Schiena</text>
            </svg>
        </div>

        <div id="exercises" class="section">
            <h2 id="ex-title">Esercizi</h2>
            <div id="exercise-list"></div>
            <input id="new-name" placeholder="Nuovo esercizio"><input id="new-desc" placeholder="Descrizione"><button onclick="addExercise()">Aggiungi</button>
        </div>

        <div id="workouts" class="section">
            <h2>Schede</h2>
            <div id="workout-list"></div>
            <button onclick="createWorkout()">Nuova Scheda</button>
        </div>

        <div id="workout-screen">
            <h2 id="current-exercise">Inizia!</h2>
            <div id="timer">01:00</div>
            <div id="reps">12 reps</div>
            <button onclick="toggleWorkout()">⏯️</button>
            <button onclick="nextExercise()">Avanti</button>
            <button onclick="stopWorkout()">Stop</button>
        </div>
    </div>

    <script>
        // ESERCIZI COMPLETI RIPRISTINATI
        let exercises = {
            petto: [
                {name: 'Panca Piana', desc: 'Sdraiati, abbassa bilanciere al petto, spingi. 3x8-12', img: 'https://via.placeholder.com/140/ffcdd2/fff?text=Panca+Piana'},
                {name: 'Croci Cavi', desc: 'Tira cavi al centro contraendo petto. 3x12', img: 'https://via.placeholder.com/140/ff69b4/fff?text=Croci'},
                {name: 'Dip', desc: 'Scendi parallele, spingi su. 3x10', img: 'https://via.placeholder.com/140/e91e63/fff?text=Dip'}
            ],
            schiena: [
                {name: 'Trazioni', desc: 'Sbarra larga, tira mento sopra. 4x6-8', img: 'https://via.placeholder.com/140/ffccbc/fff?text=Trazioni'},
                {name: 'Rematore', desc: 'Bilanciere verso addome. 3x10', img: 'https://via.placeholder.com/140/ff8a65/fff?text=Rematore'},
                {name: 'Lat Machine', desc: 'Tira barra al petto. 4x12', img: 'https://via.placeholder.com/140/ff5722/fff?text=Lat'}
            ],
            gambe: [
                {name: 'Squat', desc: 'Piedi spalle, scendi profondo. 4x8', img: 'https://via.placeholder.com/140/e8f5e8/fff?text=Squat'},
                {name: 'Leg Press', desc: 'Macchina, spingi piattaforma. 3x12', img: 'https://via.placeholder.com/140/4caf50/fff?text=LegPress'},
                {name: 'Affondi', desc: 'Passo avanti, ginocchio basso. 3x10/gamba', img: 'https://via.placeholder.com/140/66bb6a/fff?text=Affondi'}
            ],
            spalle: [
                {name: 'Military Press', desc: 'Manubri sopra testa. 3x8-10', img: 'https://via.placeholder.com/140/e1bee7/fff?text=Press'},
                {name: 'Alzate Laterali', desc: 'Manubri ai lati. 3x12', img: 'https://via.placeholder.com/140/9575cd/fff?text=Laterali'}
            ],
            braccia: [
                {name: 'Curl Bicipiti', desc: 'Manubri curl controllato. 3x12', img: 'https://via.placeholder.com/140/e3f2fd/fff?text=Curl'},
                {name: 'French Press', desc: 'Tricipiti sopra testa. 3x12', img: 'https://via.placeholder.com/140/2196f3/fff?text=French'}
            ]
        };

        let currentMuscle = 'petto', workouts = JSON.parse(localStorage.getItem('workouts')) || [], 
            currentWorkout = null, timer = 60, timerId, paused = false, currentExIndex = 0;

        function showSection(id) {
            [...document.querySelectorAll('.section')].forEach(s => s.classList.toggle('active', s.id === id));
            [...document.querySelectorAll('nav button')].forEach((b,i) => b.classList.toggle('active', ['home','exercises','workouts'].indexOf(id) === i));
            if (id === 'exercises') renderExercises();
            if (id === 'workouts') renderWorkouts();
        }

        function filterMuscle(m) {
            currentMuscle = m; showSection('exercises');
        }

        function renderExercises() {
            document.getElementById('ex-title').textContent = `Esercizi ${currentMuscle}`;
            document.getElementById('exercise-list').innerHTML = exercises[currentMuscle].map(e => 
                `<div class="exercise">
                    <img src="${e.img}" alt="${e.name}">
                    <div>
                        <h4>${e.name}</h4>
                        <p>${e.desc}</p>
                        <button onclick="addToCurrentWorkout('${e.name}','${e.desc}','${e.img}')">➕ Scheda</button>
                    </div>
                </div>`
            ).join('');
        }

        function renderWorkouts() {
            document.getElementById('workout-list').innerHTML = workouts.map((w,i) => 
                `<div class="exercise">
                    <h4>${w.name} (${w.exercises.length} esercizi)</h4>
                    <button onclick="startWorkout(${i})">▶️ Avvia</button>
                </div>`
            ).join('');
        }

        function createWorkout() {
            const name = prompt('Nome scheda:');
            if (name) {
                workouts.push({name, exercises: []});
                localStorage.setItem('workouts', JSON.stringify(workouts));
                renderWorkouts();
            }
        }

        function addToCurrentWorkout(name,desc,img) {
            if (!workouts.length) return alert('Crea prima una scheda!');
            const last = workouts[workouts.length-1];
            last.exercises.push({name,desc,img,reps:12});
            localStorage.setItem('workouts', JSON.stringify(workouts));
            renderWorkouts();
        }

        function startWorkout(i) {
            currentWorkout = workouts[i];
            currentExIndex = 0;
            document.getElementById('workout-screen').style.display = 'block';
            document.querySelector('.container > nav').style.display = 'none';
            nextExercise();
            updateTimer();
        }

        function nextExercise() {
            if (!currentWorkout || currentExIndex >= currentWorkout.exercises.length) return stopWorkout();
            const ex = currentWorkout.exercises[currentExIndex];
            document.getElementById('current-exercise').textContent = ex.name;
            document.getElementById('reps').textContent = `${ex.reps || 12} reps`;
            timer = 60;
        }

        function updateTimer() {
            timerId = setInterval(() => {
                if (paused) return;
                timer--;
                document.getElementById('timer').textContent = `00:${timer.toString().padStart(2,'0')}`;
                if (timer <= 0) {
                    currentExIndex++;
                    nextExercise();
                }
            }, 1000);
        }

        function toggleWorkout() {
            paused = !paused;
        }

        function stopWorkout() {
            clearInterval(timerId);
            document.getElementById('workout-screen').style.display = 'none';
            document.querySelector('.container > nav').style.display = 'flex';
            showSection('home');
        }

        // Init
        renderExercises();
        renderWorkouts();
    </script>
</body>
</html>
