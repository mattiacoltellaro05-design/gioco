<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Revenue Simulator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --sunset-orange: #ff6b35;
      --sunset-dark: #e55a30;
      --sunset-light: #ff8e60;
      --bg-gold: #fdf2e9;
      --card-bg: #fff8f0;
      --text-dark: #2c1b12;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, var(--bg-gold), #ffe8d6);
      min-height: 100vh; 
      color: var(--text-dark);
      padding-bottom: 100px;
    }
    
    .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
    h1 { 
      text-align: center; font-size: clamp(1.8em, 5vw, 2.5em); 
      background: linear-gradient(45deg, var(--sunset-orange), var(--sunset-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 20px 0 30px 0; 
    }
    
    .status { padding: 12px; border-radius: 10px; margin: 0 0 20px 0; text-align: center; font-weight: bold; font-size: 1.1em; }
    .running { background: #d4edda; color: #155724; }
    .stopped { background: #f8d7da; color: #721c24; }
    
    .dashboard { display: grid; gap: 20px; }
    @media (min-width: 769px) { .dashboard { grid-template-columns: 1fr 1fr; } }
    
    .card { 
      background: var(--card-bg); border-radius: 16px; padding: 20px; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
    }
    
    .cocktail-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
      gap: 12px; 
      margin: 15px 0;
    }
    .cocktail-item {
      background: white; border-radius: 12px; padding: 15px; text-align: center; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
    }
    .cocktail-name { font-weight: bold; margin-bottom: 8px; font-size: 0.95em; }
    .cocktail-btn { 
      width: 100%; padding: 12px 8px; border: none; border-radius: 8px; 
      background: var(--sunset-orange); color: white; font-weight: bold; 
      cursor: pointer; margin-bottom: 8px; font-size: 0.9em;
    }
    .cocktail-btn:hover:not(:disabled) { background: var(--sunset-dark); }
    .cocktail-btn:disabled { background: #999; cursor: not-allowed; }
    .cocktail-btn.serving { background: var(--sunset-light) !important; }
    
    .price-row { display: flex; gap: 5px; align-items: center; justify-content: center; font-size: 0.9em; }
    .price-display { font-weight: bold; color: var(--sunset-orange); min-width: 45px; }
    .price-input { width: 55px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 0.9em; }
    
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
      gap: 15px; 
      margin: 15px 0;
    }
    .stat { text-align: center; }
    .stat-label { font-size: 0.8em; opacity: 0.8; margin-bottom: 3px; }
    .stat-value { font-size: clamp(1.8em, 8vw, 2.5em); font-weight: bold; color: var(--sunset-orange); }
    
    .controls { text-align: center; margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.5); border-radius: 12px; }
    .control-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; margin-bottom: 15px; }
    button { 
      padding: 12px 24px; border: none; border-radius: 25px; 
      background: var(--sunset-orange); color: white; font-weight: bold; 
      cursor: pointer; font-size: 1em; min-width: 120px;
    }
    button:hover:not(:disabled) { background: var(--sunset-dark); transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .rush-bar { height: 10px; background: #eee; border-radius: 5px; margin: 15px auto; width: 80%; overflow: hidden; }
    .rush-progress { height: 100%; background: linear-gradient(90deg, #ff4757, var(--sunset-orange)); transition: width 0.8s; }
    
    #revenueChart { height: 250px; width: 100%; margin-top: 15px; }
    .suggestion { background: #fff3cd; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 4px solid var(--sunset-orange); font-size: 0.95em; }
    .add-drink { 
      background: rgba(255,255,255,0.8); border-radius: 10px; padding: 15px; margin-bottom: 15px;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .add-drink input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; flex: 1; min-width: 80px; }
    @media (max-width: 480px) { .add-drink input { font-size: 14px; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍹 Bar Revenue Simulator</h1>
    
    <div class="status stopped" id="status">⏹️ Notte Fermata</div>
    
    <div class="dashboard">
      <!-- MENU -->
      <div class="card">
        <h3>🍸 Menu Cocktail</h3>
        <div class="add-drink">
          <input id="newName" placeholder="Nome drink">
          <input id="newCost" type="number" step="0.01" placeholder="Costo">
          <input id="newPrice" type="number" step="0.1" placeholder="Prezzo">
          <button onclick="addDrink()">➕</button>
        </div>
        <div class="cocktail-grid" id="cocktailGrid"></div>
        <div class="rush-bar">
          <div class="rush-progress" id="rushBar" style="width: 50%"></div>
        </div>
        <small style="text-align: center; display: block;">Rush Hour: più rosso = più clienti</small>
      </div>
      
      <!-- STATS -->
      <div class="card">
        <h3>📊 LIVE STATS</h3>
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">RICAVO</div>
            <span class="stat-value" id="revenue">€0</span>
          </div>
          <div class="stat">
            <div class="stat-label">VENDUTI</div>
            <span class="stat-value" id="sold">0</span>
          </div>
          <div class="stat">
            <div class="stat-label">PROFITTO</div>
            <span class="stat-value" id="profit">€0</span>
          </div>
          <div class="stat">
            <div class="stat-label">TEMPO</div>
            <span class="stat-value" id="timeLeft">3:00</span>
          </div>
        </div>
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
    
    <!-- CONTROLLI -->
    <div class="card">
      <div class="controls">
        <div class="control-row">
          <label>👥 Clienti/ora: 
            <input type="range" id="clientRange" min="20" max="200" value="80">
            <span id="clientNum">80</span>
          </label>
        </div>
        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
          <button onclick="startNight()" id="startBtn">🚀 AVVIA NOTTE</button>
          <button onclick="endNight()" id="endBtn" disabled>⏹️ STOP</button>
          <button onclick="resetAll()" style="background: #6c757d;">🔄 RESET</button>
        </div>
        <div id="suggestions"></div>
      </div>
    </div>
  </div>

  <script>
    let cocktails = [
      { name: 'Negroni', cost: 2.10, basePrice: 12, stock: 45 },
      { name: 'Aperol Spritz', cost: 1.80, basePrice: 10, stock: 32 },
      { name: 'Gin Tonic', cost: 1.50, basePrice: 9, stock: 28 },
      { name: 'Moscow Mule', cost: 2.30, basePrice: 11, stock: 22 },
      { name: 'Margarita', cost: 2.00, basePrice: 12, stock: 18 }
    ];
    
    let gameState = {
      revenue: 0, sold: 0, profit: 0, nightTime: 180,
      prices: {}, rushLevel: 50, isRunning: false
    };
    
    let chart, gameInterval;
    
    function init() {
      renderCocktails();
      setupChart();
      updateStats();
      updateRush();
      
      document.getElementById('clientRange').addEventListener('input', function() {
        document.getElementById('clientNum').textContent = this.value;
      });
      
      setInterval(updateRush, 2000);
    }
    
    function renderCocktails() {
      document.getElementById('cocktailGrid').innerHTML = cocktails.map((c, i) => `
        <div class="cocktail-item">
          <div class="cocktail-name">${c.name}</div>
          <button class="cocktail-btn ${c.stock <= 0 ? 'disabled' : ''}" onclick="sellCocktail(${i})">
            ${c.stock > 0 ? '🍹 SERVI' : '❌ OUT'}
          </button>
          <div class="price-row">
            <span class="price-display">€${(gameState.prices[i] || c.basePrice).toFixed(1)}</span>
            <input class="price-input" type="number" step="0.1" min="3" max="25" 
                   value="${gameState.prices[i] || c.basePrice}" onchange="updatePrice(${i}, this.value)">
          </div>
          <div style="font-size: 0.8em; color: #666;">${c.stock}</div>
        </div>
      `).join('');
    }
    
    function sellCocktail(i) {
      if (cocktails[i].stock <= 0 || !gameState.isRunning) return;
      
      const btn = event.target;
      btn.classList.add('serving');
      btn.textContent = 'SERVED!';
      
      cocktails[i].stock--;
      const price = gameState.prices[i] || cocktails[i].basePrice;
      gameState.revenue += price;
      gameState.profit += (price - cocktails[i].cost);
      gameState.sold++;
      
      setTimeout(() => {
        btn.classList.remove('serving');
        btn.textContent = cocktails[i].stock > 0 ? '🍹 SERVI' : '❌ OUT';
        renderCocktails();
      }, 200);
      
      updateStats();
    }
    
    function startNight() {
      gameState.isRunning = true;
      document.getElementById('status').textContent = '▶️ Notte IN CORSO';
      document.getElementById('status').className = 'status running';
      document.getElementById('startBtn').disabled = true;
      document.getElementById('endBtn').disabled = false;
      
      gameInterval = setInterval(() => {
        if (gameState.nightTime <= 0) {
          endNight();
          return;
        }
        
        gameState.nightTime--;
        const mins = Math.floor(gameState.nightTime / 60);
        const secs = gameState.nightTime % 60;
        document.getElementById('timeLeft').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        
        const clients = parseInt(document.getElementById('clientRange').value);
        if (Math.random() < (clients / 100) * (gameState.rushLevel / 100)) {
          sellRandomCocktail();
        }
        
        updateStats();
      }, 1000);
    }
    
    function endNight() {
      gameState.isRunning = false;
      clearInterval(gameInterval);
      document.getElementById('status').textContent = '⏹️ Notte Fermata';
      document.getElementById('status').className = 'status stopped';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('endBtn').disabled = true;
      showReport();
    }
    
    function sellRandomCocktail() {
      const available = cocktails.map((c, i) => c.stock > 0 ? i : -1).filter(i => i >= 0);
      if (available.length) sellCocktail(available[Math.floor(Math.random() * available.length)]);
    }
    
    function updatePrice(i, price) {
      gameState.prices[i] = parseFloat(price);
      updateStats();
    }
    
    function updateRush() {
      gameState.rushLevel = Math.abs(Math.sin(Date.now() / 5000)) * 100;
      document.getElementById('rushBar').style.width = gameState.rushLevel + '%';
    }
    
    function setupChart() {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Ricavo', 'Profitto'],
          datasets: [{ data: [0, 0], backgroundColor: ['#ff6b35', '#ffd23f'] }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }
    
    function updateStats() {
      document.getElementById('revenue').textContent = '€' + Math.floor(gameState.revenue);
      document.getElementById('sold').textContent = gameState.sold;
      document.getElementById('profit').textContent = '€' + Math.floor(gameState.profit);
      
      if (chart) {
        chart.data.datasets[0].data = [gameState.revenue, gameState.profit];
        chart.update('none');
      }
      
      const best = cocktails.reduce((best, c, i) => {
        const margin = ((gameState.prices[i] || c.basePrice) / c.cost);
        return margin > best.margin ? {margin, name: c.name} : best;
      }, {margin: 0, name: ''});
      
      document.getElementById('suggestions').innerHTML = `
        <div class="suggestion">
          🤖 ${best.name}: ${(best.margin*100).toFixed(0)}% margine
        </div>
      `;
    }
    
    function showReport() {
      document.getElementById('suggestions').innerHTML += `
        <div class="suggestion" style="background: #d4edda;">
          📊 Ricavo: €${Math.floor(gameState.revenue)} | Profitto: €${Math.floor(gameState.profit)}
        </div>
      `;
    }
    
    function addDrink() {
      const name = document.getElementById('newName').value.trim();
      const cost = parseFloat(document.getElementById('newCost').value) || 1.5;
      const price = parseFloat(document.getElementById('newPrice').value) || 8;
      if (name && price > cost * 2) {
        cocktails.push({name, cost, basePrice: price, stock: 30});
        renderCocktails();
        document.getElementById('newName').value = '';
        document.getElementById('newCost').value = '';
        document.getElementById('newPrice').value = '';
      }
    }
    
    function resetAll() {
      if (confirm('Reset?')) {
        gameState = {revenue: 0, sold: 0, profit: 0, nightTime: 180, prices: {}, rushLevel: 50, isRunning: false};
        cocktails.forEach(c => c.stock = 30);
        renderCocktails();
        updateStats();
      }
    }
    
    window.onload = init;
  </script>
</body>
</html>
