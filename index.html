<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymApp - Palestra Personalizzata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #f8f9fa 0%, #e3f2fd 100%); }
        .btn { @apply bg-gradient-to-r from-[#4f7cac] to-[#5a9bd4] text-white font-medium py-3 px-6 rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200; }
        .muscle-hover { transition: all 0.3s; }
        .muscle-hover:hover { fill: #4f7cac; opacity: 0.8; cursor: pointer; }
        #timer { font-size: 4rem; font-weight: 600; color: #4f7cac; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">

        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-[#4f7cac] to-[#5a9bd4] bg-clip-text text-transparent mb-4">GymApp</h1>
            <p class="text-xl text-gray-600">Allenati smarter con schede personalizzate e tracking</p>
        </header>

        <!-- Navigazione tabs -->
        <nav class="flex flex-wrap justify-center gap-4 mb-12">
            <button onclick="showSection('body-map')" class="btn px-8">Mappa Muscoli</button>
            <button onclick="showSection('esercizi')" class="btn px-8">Esercizi</button>
            <button onclick="showSection('schede')" class="btn px-8">Schede</button>
            <button onclick="showSection('allenamento')" class="btn px-8">Inizia Allenamento</button>
        </nav>

        <!-- Sezione Mappa Muscoli -->
        <section id="body-map" class="hidden md:block">
            <h2 class="text-3xl font-semibold text-center mb-8 text-gray-800">Seleziona un Muscolo</h2>
            <div class="flex flex-col md:flex-row gap-12 items-center justify-center">
                <!-- SVG Body Map (fronte e retro) -->
                <svg viewBox="0 0 400 800" class="w-48 h-96 muscle-hover" onclick="showEsercizi('petto')">
                    <!-- Testa -->
                    <circle cx="200" cy="80" r="40" fill="#f0f4f8" stroke="#d1d5db" stroke-width="3"/>
                    <!-- Collo/Trapezi -->
                    <path d="M170 120 Q200 140 230 120 L230 180 Q200 200 170 180 Z" fill="#f0f4f8" stroke="#d1d5db" stroke-width="3" class="muscle-hover" onclick="showEsercizi('petto')"/>
                    <!-- Petto -->
                    <path d="M150 180 Q140 240 150 300 Q170 320 200 300 Q230 320 250 300 Q260 240 250 180 Z" fill="#ffebee" stroke="#f48fb1" stroke-width="3" class="muscle-hover" data-muscle="petto"/>
                    <!-- Addominali -->
                    <rect x="170" y="300" width="60" height="100" rx="30" fill="#e8f5e8" stroke="#a5d6a7" stroke-width="3" class="muscle-hover" data-muscle="addominali"/>
                    <!-- Braccia (bicipiti) -->
                    <path d="M130 200 Q100 280 130 380 L150 360 Q170 380 190 360 Z" fill="#e3f2fd" stroke="#4fc3f7" stroke-width="3" class="muscle-hover" data-muscle="braccia"/>
                    <path d="M270 200 Q300 280 270 380 L250 360 Q230 380 210 360 Z" fill="#e3f2fd" stroke="#4fc3f7" stroke-width="3" class="muscle-hover" data-muscle="braccia"/>
                    <!-- Gambe (quads) -->
                    <path d="M160 400 Q140 550 160 650 L190 630 Q210 650 230 630 Z" fill="#f3e5f5" stroke="#ce93d8" stroke-width="3" class="muscle-hover" data-muscle="gambe"/>
                    <path d="M240 400 Q260 550 240 650 L210 630 Q190 650 170 630 Z" fill="#f3e5f5" stroke="#ce93d8" stroke-width="3" class="muscle-hover" data-muscle="gambe"/>
                    <!-- Schiena (retro) sovrapposta semplificata -->
                    <text x="200" y="500" text-anchor="middle" font-size="12" fill="#9e9e9e">Clicca muscoli</text>
                </svg>
                <svg viewBox="0 0 400 800" class="w-48 h-96 muscle-hover rotate-180" onclick="showEsercizi('schiena')">
                    <!-- Simile ma per retro: dorsali, trapezio, ecc. -->
                    <circle cx="200" cy="80" r="40" fill="#f0f4f8" stroke="#d1d5db" stroke-width="3"/>
                    <path d="M150 180 Q120 300 150 450 Q200 480 250 450 Q280 300 250 180 Z" fill="#e8f5e8" stroke="#81c784" stroke-width="3" class="muscle-hover" data-muscle="schiena"/>
                    <!-- Altri muscoli retro... -->
                </svg>
            </div>
        </section>

        <!-- Sezione Esercizi -->
        <section id="esercizi" class="hidden">
            <h2 id="esercizi-title" class="text-3xl font-semibold mb-8 text-gray-800">Tutti gli Esercizi</h2>
            <div id="lista-esercizi" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div class="mt-8 flex gap-4">
                <input id="new-esercizio-nome" placeholder="Nome esercizio" class="flex-1 p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#4f7cac]">
                <input id="new-esercizio-desc" placeholder="Descrizione" class="flex-1 p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#4f7cac]">
                <button onclick="addEsercizio()" class="btn">Aggiungi</button>
            </div>
        </section>

        <!-- Sezione Schede -->
        <section id="schede" class="hidden">
            <h2 class="text-3xl font-semibold mb-8 text-gray-800">Crea Schede Personalizzate</h2>
            <div id="schede-lista" class="mb-8"></div>
            <div class="flex gap-4 mb-8">
                <input id="scheda-nome" placeholder="Nome scheda (es. Full Body)" class="flex-1 p-3 rounded-xl border border-gray-300">
                <button onclick="creaScheda()" class="btn">Crea Nuova</button>
            </div>
            <div id="scheda-builder" class="hidden">
                <h3 id="current-scheda-nome" class="text-2xl mb-4"></h3>
                <div id="esercizi-scheda" class="mb-4"></div>
                <button onclick="salvaScheda()" class="btn mr-4">Salva Scheda</button>
                <button onclick="startAllenamento()" class="btn bg-green-500 hover:bg-green-600">Inizia!</button>
            </div>
        </section>

        <!-- Sezione Allenamento -->
        <section id="allenamento" class="hidden">
            <h2 id="allenamento-title" class="text-3xl font-semibold mb-8 text-gray-800">Allenamento: <span id="current-esercizio"></span></h2>
            <div class="text-center mb-12">
                <div id="timer" class="mb-8">00:00</div>
                <div class="text-2xl mb-4">Serie: <span id="serie">1</span>/ <span id="tot-serie">3</span> | Reps: <span id="reps">12</span></div>
                <div class="flex gap-4 justify-center">
                    <button onclick="startTimer()" class="btn bg-green-500 hover:bg-green-600 px-12 text-xl">Start</button>
                    <button onclick="pauseTimer()" class="btn bg-yellow-500 hover:bg-yellow-600 px-12 text-xl">Pause</button>
                    <button onclick="resetTimer()" class="btn bg-red-500 hover:bg-red-600 px-12 text-xl">Reset</button>
                    <button onclick="nextSerie()" class="btn px-12 text-xl">Serie Fatta ✓</button>
                </div>
            </div>
            <button onclick="endAllenamento()" class="btn w-full">Fine Allenamento</button>
        </section>

    </div>

    <script>
        // Dati esercizi (scaricabili da esercizi.json se su server)
        let esercizi = {
            petto: [
                {name: 'Panca piana con bilanciere', desc: 'Esercizio composto per pettorali, tricipiti e deltoidi anteriori. Sdraiati su panca, impugna bilanciere e abbassa al petto spingendo su.'}[web:2],
                {name: 'Panca inclinata con manubri', desc: 'Per parte alta pettorali. Sdraiati su panca inclinata, manubri in mano, abbassa e spingi su.'},
                {name: 'Croci ai cavi', desc: 'Isolamento pettorali. Ai cavi incrociati, braccia tese avanti contraendo il petto.'}
            ],
            schiena: [
                {name: 'Trazioni alla sbarra', desc: 'Per dorsali e bicipiti. Impugna sbarra larga, tira su fino al mento.'[web:2]},
                {name: 'Rematore con bilanciere', desc: 'Per dorsali medi e trapezio. Chinati, tira bilanciere verso addome.'},
                {name: 'Pulley basso', desc: 'Seduto, tira maniglia verso addome contraendo la schiena.'}
            ],
            spalle: [
                {name: 'Military press', desc: 'Composto per deltoidi. Seduto o in piedi, spingi bilanciere sopra la testa.'[web:4]},
                {name: 'Alzate laterali', desc: 'Per deltoidi laterali. Manubri ai lati, alza braccia parallele al suolo.'},
                {name: 'Alzate frontali', desc: 'Per deltoidi anteriori. Manubri davanti, alza braccia in avanti.'}
            ],
            braccia: [
                {name: 'Curl bicipiti con bilanciere', desc: 'Per bicipiti. In piedi, curla bilanciere verso spalle.'},
                {name: 'French press', desc: 'Per tricipiti. Sopra la testa, abbassa manubrio dietro la nuca.'[web:4]},
                {name: 'Pushdown tricipiti', desc: 'Ai cavi, spingi maniglia giù estendendo gomiti.'}
            ],
            gambe: [
                {name: 'Squat', desc: 'Per quadricipiti, glutei e femorali. Bilanciere sulle spalle, scendi in accosciata.'[web:3]},
                {name: 'Leg press', desc: 'Macchina per gambe. Spingi piattaforma via con piedi.'},
                {name: 'Leg curl', desc: 'Per femorali. Sdraiato prono, curla talloni verso glutei.'}
            ],
            addominali: [
                {name: 'Crunch', desc: 'Per addominali alti. Sdraiato, solleva spalle contraendo addome.'[web:8]},
                {name: 'Plank', desc: 'Isometria per core. Avambracci a terra, corpo dritto.'},
                {name: 'Leg raises', desc: 'Per addominali bassi. Appeso o sdraiato, alza gambe.'}
            ]
        };

        let schede = JSON.parse(localStorage.getItem('schede')) || [];
        let currentScheda = null;
        let timerInterval;
        let tempo = 0;
        let reps = 12;
        let serie = 1;
        let totSerie = 3;
        let currentEsercizioIndex = 0;

        // Mostra sezione
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'esercizi') renderEsercizi();
            if (id === 'schede') renderSchede();
        }

        // Event listeners per muscoli SVG
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('[data-muscle]').forEach(el => {
                el.addEventListener('click', (e) => {
                    const muscle = e.target.dataset.muscle;
                    showEsercizi(muscle);
                });
            });
        });

        // Mostra esercizi per muscolo
        function showEsercizi(muscolo) {
            document.getElementById('esercizi-title').textContent = `Esercizi per ${muscolo.charAt(0).toUpperCase() + muscolo.slice(1)}`;
            esercizi[muscolo] = esercizi[muscolo] || [];
            renderEsercizi();
            showSection('esercizi');
        }

        // Render lista esercizi
        function renderEsercizi() {
            const lista = document.getElementById('lista-esercizi');
            const currentMuscle = document.getElementById('esercizi-title').textContent.split(' ')[2]?.toLowerCase() || 'tutti';
            const filtered = currentMuscle === 'tutti' ? Object.values(esercizi).flat() : esercizi[currentMuscle] || [];
            lista.innerHTML = filtered.map(ex => `
                <div class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition-all">
                    <h3 class="font-semibold text-xl mb-2">${ex.name}</h3>
                    <p class="text-gray-600 mb-4">${ex.desc}</p>
                    <div class="flex gap-2">
                        <button onclick="addToScheda('${ex.name}')" class="px-4 py-2 bg-[#4f7cac]/20 text-[#4f7cac] rounded-xl hover:bg-[#4f7cac]/40">Aggiungi a Scheda</button>
                    </div>
                </div>
            `).join('');
        }

        // Aggiungi nuovo esercizio
        function addEsercizio() {
            const nome = document.getElementById('new-esercizio-nome').value;
            const desc = document.getElementById('new-esercizio-desc').value;
            if (!nome || !desc) return;
            const muscle = document.getElementById('esercizi-title').textContent.split(' ')[2]?.toLowerCase() || 'altro';
            if (!esercizi[muscle]) esercizi[muscle] = [];
            esercizi[muscle].push({name: nome, desc: desc});
            renderEsercizi();
            document.getElementById('new-esercizio-nome').value = '';
            document.getElementById('new-esercizio-desc').value = '';
            saveData();
        }

        // Gestione Schede
        function renderSchede() {
            document.getElementById('schede-lista').innerHTML = schede.map((s, i) => `
                <div class="bg-white p-6 rounded-2xl shadow-md mb-4">
                    <h3 class="font-semibold text-xl">${s.nome}</h3>
                    <p>${s.esercizi.length} esercizi</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="loadScheda(${i})" class="px-4 py-2 bg-blue-500 text-white rounded-xl text-sm">Modifica</button>
                        <button onclick="deleteScheda(${i})" class="px-4 py-2 bg-red-500 text-white rounded-xl text-sm">Elimina</button>
                    </div>
                </div>
            `).join('');
        }

        function creaScheda() {
            const nome = document.getElementById('scheda-nome').value;
            if (!nome) return;
            currentScheda = {nome, esercizi: []};
            document.getElementById('current-scheda-nome').textContent = nome;
            document.getElementById('scheda-builder').classList.remove('hidden');
            document.getElementById('scheda-nome').value = '';
            renderEserciziScheda();
        }

        function addToScheda(nome) {
            if (!currentScheda) return alert('Crea prima una scheda!');
            const ex = {name: nome, serie: 3, reps: 12};
            if (!currentScheda.esercizi.some(e => e.name === nome)) {
                currentScheda.esercizi.push(ex);
                renderEserciziScheda();
            }
        }

        function renderEserciziScheda() {
            document.getElementById('esercizi-scheda').innerHTML = currentScheda.esercizi.map((ex, i) => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl mb-2">
                    <span>${ex.name} (${ex.serie}x${ex.reps})</span>
                    <button onclick="removeFromScheda(${i})" class="text-red-500">✕</button>
                </div>
            `).join('');
        }

        function removeFromScheda(i) {
            currentScheda.esercizi.splice(i, 1);
            renderEserciziScheda();
        }

        function salvaScheda() {
            if (schede.some(s => s.nome === currentScheda.nome)) {
                const idx = schede.findIndex(s => s.nome === currentScheda.nome);
                schede[idx] = currentScheda;
            } else {
                schede.push(currentScheda);
            }
            currentScheda = null;
            document.getElementById('scheda-builder').classList.add('hidden');
            renderSchede();
            saveData();
        }

        function loadScheda(i) {
            currentScheda = {...schede[i]};
            document.getElementById('current-scheda-nome').textContent = currentScheda.nome;
            document.getElementById('scheda-builder').classList.remove('hidden');
            renderEserciziScheda();
        }

        function deleteScheda(i) {
            schede.splice(i, 1);
            renderSchede();
            saveData();
        }

        // Allenamento
        function startAllenamento() {
            if (!currentScheda || currentScheda.esercizi.length === 0) return alert('Crea e salva una scheda prima!');
            showSection('allenamento');
            nextEsercizio();
        }

        function nextEsercizio() {
            if (currentEsercizioIndex >= currentScheda.esercizi.length) {
                endAllenamento();
                return;
            }
            const ex = currentScheda.esercizi[currentEsercizioIndex];
            document.getElementById('current-esercizio').textContent = ex.name;
            serie = 1;
            totSerie = ex.serie;
            reps = ex.reps;
            updateDisplay();
        }

        function nextSerie() {
            serie++;
            if (serie > totSerie) {
                currentEsercizioIndex++;
                nextEsercizio();
            } else {
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById('serie').textContent = serie;
            document.getElementById('tot-serie').textContent = totSerie;
            document.getElementById('reps').textContent = reps;
        }

        // Timer
        function startTimer() {
            timerInterval = setInterval(() => {
                tempo++;
                const mins = Math.floor(tempo / 60);
                const secs = tempo % 60;
                document.getElementById('timer').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            tempo = 0;
            document.getElementById('timer').textContent = '00:00';
        }

        function endAllenamento() {
            showSection('schede');
            alert('Allenamento completato! 💪');
            currentEsercizioIndex = 0;
        }

        // Salva/Load dati locali
        function saveData() {
            localStorage.setItem('schede', JSON.stringify(schede));
            localStorage.setItem('esercizi', JSON.stringify(esercizi));
        }

        // Load iniziale
        if (localStorage.getItem('esercizi')) {
            esercizi = JSON.parse(localStorage.getItem('esercizi'));
        }
        renderSchede();
        showSection('body-map'); // Default
    </script>
</body>
</html>
